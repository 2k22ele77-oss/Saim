<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday 💖</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      padding: 40px 20px;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.15);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      color: #fff;
      max-width: 600px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: float 6s linear infinite;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      left: -10px;
      top: 0;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(45deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(45deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Happy Birthday Hajra 💖</h1>
  <p id="typing"></p>
</div>

<script>
  // Original Message
  const message = `Happy birthday 🎂🎂 to the person who has seen every version of me and stayed through them all. We started as college friends, but somewhere between the late-night study sessions and the life-changing heart-to-hearts, you became my sister.I don't just value our memories; I value the way you make the world feel a little safer and a lot brighter just by being in it.Here’s to the girl who knows my past and believes in my future.Thank you meri life mein hone ke liye aur mujhe hamesha samajhne ke liye or hamesha achi advices dene ke liye.Dost toh bohat milte hain, par behen sirf naseeb walon ko milti hai jese ma tmhe mili 😂😂Allah tmhe hamesha khush rakhe or tmhare bht bht ache naseeb kare ❤️❤️Lots of love ❤️ and yad rakhna ye treat bhi lon gi ma Pakistan aa kar 🤪`;

  let index = 0;
  function typeEffect() {
    if (index < message.length) {
      document.getElementById("typing").innerHTML += message.charAt(index);
      index++;
      setTimeout(typeEffect, 25);
    }
  }

  typeEffect();

  // Hearts Animation
  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }

  setInterval(createHeart, 300);
</script>

</body>
</html>
